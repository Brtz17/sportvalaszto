<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bejelentkezés - Sportválasztó</title>
  <link rel="stylesheet" href="style/login.css">
  <script type="module" src="js/login.js"></script>
</head>
<body>
  <div id="form-wrapper">
    <h2>Bejelentkezés</h2>
    <div id="message-container"></div>
    
    <form id="login-form">
      <input type="email" name="email" placeholder="Email cím" required>
      <div class="password-input-group">
        <input type="password" name="password" id="password" placeholder="Jelszó" required>
        <button type="button" class="password-toggle-btn" data-target="password">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" role="img" aria-label="Mutasd a jelszót">
                <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"
                    d="M1.5 12s4.5-7.5 10.5-7.5S22.5 12 22.5 12s-4.5 7.5-10.5 7.5S1.5 12 1.5 12z"/>
                <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.6"/>
            </svg>
        </button>      
      </div>
      <button type="submit">Bejelentkezés</button>
    </form>

    <button id="google">

      Google-fiók használata
    </button>
    
    <div class="auth-links">
      <p>Még nincs fiókod? <a href="/signup.html">Regisztrálj</a></p>
      <a href="/index.html">Vissza a főoldalra</a>
    </div>
  </div>
</body>
</html>
