<!DOCTYPE html>
<html lang="hu">
<head>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1f2937">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bejelentkezés - Sportválasztó</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="style/login.css">
  <script type="module" src="js/login.js"></script>
</head>
<body>
  <div id="login-card">

    <div id="login-brand">
      <div id="login-logo">S</div>
      <div>
        <h1>Sportválasztó</h1>
        <p>Üdvözlünk! Jelentkezz be a folytatáshoz.</p>
      </div>
    </div>

    <div id="message-container"></div>

    <form id="login-form">

      <div class="form-group-kompakt">
        <label class="label-kompakt">Email cím</label>
        <input class="input-kompakt" type="email" name="email" placeholder="pelda@email.hu" required>
      </div>

      <div class="form-group-kompakt">
        <label class="label-kompakt">Jelszó</label>
        <div class="password-input-group" style="position:relative">
          <input class="input-kompakt" type="password" name="password" id="password" placeholder="••••••••" required style="padding-right:2.75rem">
          <button type="button" class="password-toggle-btn" data-target="password">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" role="img" aria-label="Mutasd a jelszót">
              <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"
                d="M1.5 12s4.5-7.5 10.5-7.5S22.5 12 22.5 12s-4.5 7.5-10.5 7.5S1.5 12 1.5 12z"/>
              <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.6"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary">Bejelentkezés</button>

    </form>

    <div class="divider"><span>vagy</span></div>

    <button id="google" class="btn-google">
      <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google-fiók használata
    </button>

    <div class="auth-links">
      <p>Még nincs fiókod? <a href="/signup.html">Regisztrálj</a></p>
      <a href="/index.html">← Vissza a főoldalra</a>
    </div>

  </div>
</body>
</html>
