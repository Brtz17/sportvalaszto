<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil</title>
    <link rel="stylesheet" href="style/profile.css">
    <script type="module" src="js/profile.js"></script>
</head>
<body>
    <header class="header1">
        <div class="logo-container">
            <h1 class="site-name">Sportválasztó</h1>
        </div>
        <div class="menu-container">
            <button id="hamburger">
                <svg id="hamburger-icon" xmlns="http://www.w3.org/2000/svg" 
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" 
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
                <svg id="x-icon" xmlns="http://www.w3.org/2000/svg" 
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" 
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="4" y1="4" x2="20" y2="20"/>
                    <line x1="20" y1="4" x2="4" y2="20"/>
                </svg>

            </button>
        </div>
    </header>

    <div class="content" id="bal-oldal">
        <div id="site-btn-container">

        </div>
        <button id="new-team-btn">Új csapat hozzáadása</button>
        <div id="profile-btn-container">
            <button id="profile-btn">Profilom</button>
            <button id="logout-btn" style="color: #dc3545;">Kijelentkezés</button>
        </div>
    </div>
    
    <div class="content" id="jobb-oldal">

    </div>
</body>
</html>
