<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/index.css">
    <script type="module">
        window.APPWRITE_ENDPOINT = "https://cloud.appwrite.io/v1";
        window.APPWRITE_PROJECT_ID = "68fe2fae00030619f0a5";
    </script>
    <script type="module" src="js/index.js" defer></script>
    <title>Sportválasztó</title>
</head>
<body>
  <header class="header1">
      <a class="logo-container" href="/">
          <h1 class="site-name">Sportválasztó</h1>
      </a>
      <div class="search-wrapper">
          <input type="search" name="search" data-search placeholder="Keresés név, email vagy sport alapján…">
      </div>
      <div class="header-right">
          <button class="filter-toggle-btn" id="filter-toggle-btn" type="button" aria-expanded="false" aria-controls="filter-panel">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="4" y1="6" x2="20" y2="6"/>
                  <line x1="8" y1="12" x2="16" y2="12"/>
                  <line x1="11" y1="18" x2="13" y2="18"/>
              </svg>
              Szűrők
              <span class="filter-badge hide" id="filter-badge">0</span>
          </button>
          <a class="login-btn" id="loginButton" href="/profile.html">
              <svg class="login-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M12 11C14.2091 11 16 9.20914 16 7C16 4.79086 14.2091 3 12 3C9.79086 3 8 4.79086 8 7C8 9.20914 9.79086 11 12 11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
          </a>
      </div>
  </header>

  <!-- Aktív szűrők sávja -->
  <div class="active-filter-bar hide" id="active-filter-bar">
      <div class="active-chips" id="active-chips"></div>
      <button class="filter-reset-btn" id="filter-reset-btn" type="button">Összes törlése</button>
  </div>

  <!-- Lebegő szűrőpanel háttér -->
  <div class="filter-overlay hide" id="filter-overlay"></div>

  <!-- Lebegő szűrőpanel -->
  <div class="filter-panel hide" id="filter-panel" role="dialog" aria-modal="true" aria-label="Szűrők">
      <div class="filter-panel-header">
          <h2>Szűrők</h2>
          <button class="filter-close-btn" id="filter-close-btn" type="button" aria-label="Bezárás">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <line x1="4" y1="4" x2="20" y2="20"/>
                  <line x1="20" y1="4" x2="4" y2="20"/>
              </svg>
          </button>
      </div>

      <div class="filter-panel-body">

          <!-- SPORTOK -->
          <div class="filter-section">
              <div class="filter-section-header">
                  <span class="filter-section-label">Sport</span>
                  <button class="filter-section-clear hide" data-section="sport" type="button">Törlés</button>
              </div>
              <div class="filter-chips-grid" id="sport-chips"></div>
          </div>

          <div class="filter-divider"></div>

          <!-- HELYSZÍN -->
          <div class="filter-section">
              <div class="filter-section-header">
                  <span class="filter-section-label">Helyszín</span>
                  <button class="filter-section-clear hide" data-section="varos" type="button">Törlés</button>
              </div>
              <div class="filter-chips-grid" id="varos-chips"></div>
          </div>

          <div class="filter-divider"></div>

          <!-- TAGDÍJ -->
          <div class="filter-section">
              <div class="filter-section-header">
                  <span class="filter-section-label">Tagdíj (Ft)</span>
                  <button class="filter-section-clear hide" data-section="tagdij" type="button">Törlés</button>
              </div>
              <div class="tagdij-inputs">
                  <div class="tagdij-field">
                      <label class="tagdij-label" for="tagdij-min">Minimum</label>
                      <div class="tagdij-input-wrap">
                          <input class="tagdij-input" type="number" id="tagdij-min" min="0" step="500" placeholder="0">
                          <span class="tagdij-currency">Ft</span>
                      </div>
                  </div>
                  <div class="tagdij-separator">–</div>
                  <div class="tagdij-field">
                      <label class="tagdij-label" for="tagdij-max">Maximum</label>
                      <div class="tagdij-input-wrap">
                          <input class="tagdij-input" type="number" id="tagdij-max" min="0" step="500" placeholder="∞">
                          <span class="tagdij-currency">Ft</span>
                      </div>
                  </div>
              </div>
              <p class="tagdij-hint" id="tagdij-hint"></p>
          </div>

      </div>

      <div class="filter-panel-footer">
          <button class="filter-clear-all-btn" id="filter-clear-all-btn" type="button">Összes törlése</button>
          <button class="filter-apply-btn" id="filter-apply-btn" type="button">Alkalmaz</button>
      </div>
  </div>

  <div class="user-cards" data-user-cards-container></div>

  <template data-user-template>
    <div class="card">
      <img class="data-image" data-image alt="Profilkép">
      <div class="header" data-header></div>
      <div class="body" data-body></div>
    </div>
  </template>

</body>
</html>
